dete sie die professionelle Dancecompany <strong>„TippingPoint“</strong>, mit der sie Performances in ungewöhnlicher Atmosphäre sucht und umsetzt.<br><strong>2016 </strong>rief sie, zusammen mit Jana Schmück und Dr. Ronit Land<strong>, ContiP – Contemporary dance in Process </strong>– ins Leben<strong>, </strong>ein Netzwerk von professionellen Tanzkünstlern, Pädagogen und Wissenschaftlern, die sich mit der prozessorientierten Arbeit im zeitgenössischen Tanz auseinandersetzen.<br/>
